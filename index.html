<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Loi Lemoine — Assurance Emprunteur — Jeremy Dallinges</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1A3C34;
            --navy-mid: #245C4F;
            --gold: #3DB984;
            --gold-light: #6DCFAA;
            --cream: #F4FAF7;
            --cream-dark: #E0F0E9;
            --text: #1A1A1A;
            --text-muted: #6B6B6B;
            --white: #FFFFFF;
            --green: #1A3C34;
            --green-light: #3DB984;
            --red: #C0392B;
            --red-light: #FFF0F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        /* HERO */
        .hero {
            background: var(--navy);
            padding: 48px 24px 64px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -80px; right: -80px;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(61,185,132,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(24px, 4vw, 40px);
            letter-spacing: -0.5px;
            color: var(--white);
            line-height: 1.15;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .hero h1 span { color: var(--gold); }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(61,185,132,0.15);
            border: 1px solid rgba(61,185,132,0.3);
            color: var(--gold-light);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* CONTAINER & CARD */
        .container {
            max-width: 700px;
            margin: -32px auto 48px;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }
        .card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 8px 48px rgba(13,27,42,0.12);
            overflow: hidden;
        }

        .form-body { padding: 28px 28px 24px; }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            border-bottom: 1px solid var(--cream-dark);
            padding-bottom: 8px;
        }

        .field-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        input[type="number"], select {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--cream-dark);
            border-radius: 10px;
            background: var(--cream);
            font-size: 15px;
            outline: none;
        }

        .input-wrap { position: relative; }
        .unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 600; color: var(--text-muted); }

        /* RESULTS STYLE */
        .results { display: none; padding: 0 28px 28px; animation: fadeUp 0.4s ease; }
        .results.show { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .economy-hero {
            background: linear-gradient(135deg, #1A3C34 0%, #245C4F 100%);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            color: white;
            margin-bottom: 16px;
        }
        .economy-amount { font-family: 'Montserrat', sans-serif; font-size: 40px; color: var(--gold-light); font-weight: 700; }

        .cta-btn {
            width: 100%;
            padding: 16px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            background: #25D366;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .courtier-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            background: var(--cream);
            border-top: 1px solid var(--cream-dark);
        }
        .photo-pro { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--gold); }

        @media (max-width: 480px) {
            .field-group { grid-template-columns: 1fr; }
            .courtier-section { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="badge">⚖️ Loi Lemoine — En vigueur</div>
    <h1>Votre assurance groupe<br><span>vous coûte trop cher.</span></h1>
    <p>Calculez l'économie réelle en passant à un contrat délégué à tout moment.</p>
</div>

<div class="container">
    <div class="card">
        <div class="form-body">
            <div class="section-title">Votre prêt immobilier</div>
            <div class="field-group">
                <div class="field">
                    <label>Capital restant</label>
                    <div class="input-wrap">
                        <input type="number" id="capital" placeholder="250000">
                        <span class="unit">€</span>
                    </div>
                </div>
                <div class="field">
                    <label>Durée restante</label>
                    <div class="input-wrap">
                        <input type="number" id="duree" placeholder="20">
                        <span class="unit">ans</span>
                    </div>
                </div>
            </div>

            <div class="field-group">
                <div class="field">
                    <label>Votre âge</label>
                    <input type="number" id="age" placeholder="35">
                </div>
                <div class="field">
                    <label>Quotité</label>
                    <select id="quotite">
                        <option value="1">100 %</option>
                        <option value="0.5">50 %</option>
                    </select>
                </div>
            </div>

            <button class="cta-btn" onclick="simuler()">Calculer mon économie →</button>
        </div>

        <div class="results" id="results">
            <div class="economy-hero">
                <div style="font-size: 11px; text-transform: uppercase;">Économie totale estimée</div>
                <div class="economy-amount" id="res-eco">0 €</div>
            </div>
            
            <a id="wa-link" href="#" class="whatsapp-btn" target="_blank">
                Obtenir mon devis gratuit — Jeremy Dallinges
            </a>
        </div>

        <div class="courtier-section">
            <div class="courtier-info">
                <img src="https://via.placeholder.com/150" class="photo-pro" alt="Jeremy Dallinges">
                <div style="margin-left: 10px;">
                    <div style="font-weight: 700;">Jeremy Dallinges</div>
                    <div style="font-size: 12px; color: var(--text-muted);">Courtier à Toulouse</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function simuler() {
        const capital = parseFloat(document.getElementById('capital').value);
        const duree = parseInt(document.getElementById('duree').value);
        const age = parseInt(document.getElementById('age').value);
        const quotite = parseFloat(document.getElementById('quotite').value);

        if (!capital || !duree) return alert("Complétez les champs");

        // Calcul simplifié expert
        const tauxGroupe = 0.35 / 100; 
        let tauxDeleg = age > 45 ? 0.12 / 100 : 0.07 / 100;

        const coutGroupe = capital * tauxGroupe * duree * quotite;
        const coutDeleg = capital * tauxDeleg * duree * quotite;
        const ecoTot = coutGroupe - coutDeleg;

        document.getElementById('res-eco').textContent = Math.round(ecoTot).toLocaleString() + " €";
        document.getElementById('results').classList.add('show');
        
        const msg = encodeURIComponent(`Bonjour Jeremy, simulation Lemoine : Capital ${capital}€, Durée ${duree} ans. Économie : ${Math.round(ecoTot)}€.`);
        document.getElementById('wa-link').href = `https://wa.me/33609163435?text=${msg}`;
    }
</script>

</body>
</html>
